<html>
    <head>
        <title>Bulb project</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        
        <style>
        * {
             margin:0;
             padding:0;
             box-sizing:border-box;
        }
         
        body {
            background-color:#1a1a1a;
            color:white;
            width: 100vw;
            height: 100vh;
            display: grid;
            place-content: center;
            }  
  
        h1 {
            color:#FFA500;
            text-align:center;
            background-color:#1a1a1a;
            height:50px;
            margin:5px;
            padding:10px;
            font-weight:600px;
        }
        div {
             width: 350px;
             text-align: center;
             height: 350px;
            
        }
        img {
                width:350px;
               text-align:center;
             }
        button {
               width: 350px;
               height: 40px;
               font-size: 20px;
               margin: 5px;
               border-radius:5px;
                background-color:green;
        }  
        
        h2 {
            color:white;
            font-size:30px;
            margin:20px;
            padding:10px;
            text-align:left;
            font-weight:600px;
            
        }
    p {
         font-size: 20px;
         margin:5px;
         padding:10px;
         text-align:left;
         color:#CCCCCC;
    }
        </style>
    </head>
    
    <body>
        <h1><b><u>Light Toggle Project</u></b></h1>
       
        <div>
            <img src="bulb1.jpg" alt="image not found" id="bulb">
           <button onclick="change()" id="btn">Turn On</button>
        </div>
      
        <h2>💡About this Project </h2>
        
        <p>
            
           It is a simple bulb ON/OFF project created 
            using HTML, CSS, and JavaScript.
            <br>
            <br>
            It changes the bulb state when the buttons 
            are clicked.
    
        </p>

     <script>
            let bulb = document.getElementById('bulb');
            let btn = document.getElementById('btn');
            const audio = new Audio('sound.mp3');
            let light = false;

            function change () {
                audio.play();

                if(light==false) {
                    bulb.setAttribute("src", "bulb.jpg");
                    light = true;
                    btn.innerHTML = "Turn Off";
                }
                else {
                    bulb.setAttribute("src", "bulb1.jpg");
                    light = false;
                    btn.innerHTML = "Turn On";
                }

            }
        </script>
    
    </body>
</html>
